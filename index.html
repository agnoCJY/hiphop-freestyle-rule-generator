<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="HipHop Freestyle 规则生成器 - 随机生成身体形变和音乐理解组合，拓展 Freestyle 思路">
    <meta name="theme-color" content="#0b0914">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Freestyle 规则生成器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap');

        :root {
            --bg-color: #0b0914;
            --card-bg: rgba(20, 18, 28, 0.7);
            --accent-gradient: linear-gradient(135deg, #ff3366, #ff9933);
            --accent-color: #ff3366;
            --text-primary: #ffffff;
            --text-secondary: #a09eb0;
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            background-color: var(--bg-color);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 51, 102, 0.15), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 153, 51, 0.15), transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding-bottom: 40px;
            padding-top: 20px;
        }

        /* 标题区 */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
            font-style: italic;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.05em;
            font-style: italic;
        }

        .card-icon {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 18px;
            font-weight: 800;
        }

        /* 选项网格 */
        .form-section {
            margin-bottom: 24px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .option-btn.selected {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.3);
        }

        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.2);
            letter-spacing: 0.05em;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            flex: 0 0 auto;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 结果展示 */
        .result-display {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            color: var(--text-secondary);
        }

        .result-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* BPM 区域 */
        .bpm-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }

        .bpm-value-wrapper {
            position: relative;
            margin-bottom: 24px;
            text-align: center;
        }

        .bpm-value {
            font-size: 72px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            font-style: italic;
            display: inline-block;
            padding: 0 10px;
        }

        .bpm-unit {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            margin-top: 12px;
            font-weight: 500;
        }

        .tap-area {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tap-area:hover {
            border-color: var(--accent-color);
            background: rgba(255, 51, 102, 0.05);
        }

        .tap-area:active {
            background: rgba(255, 51, 102, 0.1);
            transform: scale(0.98);
            border-style: solid;
        }

        .tap-icon {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        .tap-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tap-subtext {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 节拍器网格 */
        .beats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .beat-box {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 18px;
            transition: all 0.1s ease;
            position: relative;
        }

        .beat-box span {
            font-size: 10px;
            margin-top: 4px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .beat-box.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.3);
        }

        .beat-box.active span {
            color: rgba(255, 255, 255, 0.9);
        }

        .beat-box.freeze {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .beat-box.freeze.active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .beat-box.freeze.active span {
            color: #000;
        }

        .beat-box.freeze span {
            display: none;
        }

        .freeze-indicator {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-top: 4px;
            color: inherit;
        }

        .hidden {
            display: none !important;
        }

        /* 响应式调整 */
        @media (min-width: 640px) {
            .option-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .beats-grid {
                grid-template-columns: repeat(8, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Freestyle 规则</h1>
            <div class="subtitle">生成器</div>
        </header>

        <!-- 身体形变规则 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="card-icon">01</span> 身体控制 (Body Controls)
                </div>
            </div>
            
            <div class="form-section">
                <label class="form-label">脚步轨迹</label>
                <div class="option-grid" id="footworkOptions">
                    <button class="option-btn" data-type="footwork" data-value="画三角">画三角</button>
                    <button class="option-btn" data-type="footwork" data-value="画正方形">画正方形</button>
                    <button class="option-btn" data-type="footwork" data-value="画圆形">画圆形</button>
                    <button class="option-btn" data-type="footwork" data-value="画十字">画十字</button>
                    <button class="option-btn" data-type="footwork" data-value="画叉">画叉</button>
                    <button class="option-btn" data-type="footwork" data-value="画米字">画米字</button>
                    <button class="option-btn" data-type="footwork" data-value="九宫格">九宫格</button>
                    <button class="option-btn" data-type="footwork" data-value="画字母">画字母</button>
                </div>
            </div>

            <div class="form-section">
                <label class="form-label">高低起伏</label>
                <div class="option-grid" id="heightOptions">
                    <button class="option-btn" data-type="height" data-value="由高到低">由高到低</button>
                    <button class="option-btn" data-type="height" data-value="由低到高">由低到高</button>
                    <button class="option-btn" data-type="height" data-value="高-低-高">高-低-高</button>
                    <button class="option-btn" data-type="height" data-value="始终高位">始终高位</button>
                    <button class="option-btn" data-type="height" data-value="始终低位">始终低位</button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="randomBody">随机生成</button>
                <button class="btn btn-secondary" id="resetBody">重置</button>
            </div>

            <div class="result-display hidden" id="bodyResult">
                <div class="result-item">
                    <span class="result-label">脚步</span>
                    <span class="result-value" id="footworkResult">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">高低</span>
                    <span class="result-value" id="heightResult">-</span>
                </div>
            </div>
        </div>

        <!-- BPM 生成器 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="card-icon">02</span> BPM 测速
                </div>
            </div>
            
            <div class="bpm-container">
                <div class="bpm-value-wrapper">
                    <div class="bpm-value" id="bpmValue">--</div>
                    <div class="bpm-unit">每分钟节拍数</div>
                </div>

                <div class="tap-area" id="tapArea">
                    <div class="tap-icon">↓</div>
                    <div class="tap-text">点击这里 (Tap)</div>
                    <div class="tap-subtext">连续点击以测算 BPM</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="startMetronome">启动节拍器</button>
                <button class="btn btn-secondary" id="resetBPM">重置</button>
            </div>
        </div>

        <!-- 节拍器与 Freeze -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="card-icon">03</span> 节拍与定格 (Beat & Freeze)
                </div>
            </div>
            
            <div class="beats-grid" id="beatsGrid">
                <!-- 动态生成 8 个拍子 -->
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="randomFreeze">设置定格点 (Freeze)</button>
                <button class="btn btn-secondary" id="stopMetronome">停止</button>
            </div>

            <div class="result-display hidden" id="freezeResult">
                <div class="result-item">
                    <span class="result-label">目标节拍</span>
                    <span class="result-value" id="freezeBeat">-</span>
                </div>
                <div class="result-item" style="border-top: 1px solid var(--border-color); margin-top: 12px; padding-top: 12px; flex-direction: column; align-items: flex-start; gap: 4px;">
                    <span class="result-label" style="font-size: 11px; text-transform: uppercase;">提示</span>
                    <span class="result-value" style="font-size: 12px; color: var(--text-secondary); font-weight: 400;">在这个节拍上使用隔离 (Isolation) 或电流 (Wave) 等质感完成定格 (Freeze)。</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';
        
        // 身体形变逻辑
        let selectedFootwork = null;
        let selectedHeight = null;

        // 缓存 DOM 元素
        const footworkResult = document.getElementById('footworkResult');
        const heightResult = document.getElementById('heightResult');
        const bodyResult = document.getElementById('bodyResult');
        const bpmValue = document.getElementById('bpmValue');
        const tapArea = document.getElementById('tapArea');
        const freezeBeat = document.getElementById('freezeBeat');
        const freezeResult = document.getElementById('freezeResult');
        const beatsGrid = document.getElementById('beatsGrid');

        // 身体形变选择
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const type = this.dataset.type;
                const value = this.dataset.value;
                
                if (type === 'footwork') {
                    document.querySelectorAll('[data-type="footwork"]').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedFootwork = value;
                } else if (type === 'height') {
                    document.querySelectorAll('[data-type="height"]').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedHeight = value;
                }
                
                updateBodyResult();
            }, { passive: false });
        });

        document.getElementById('randomBody').addEventListener('click', function(e) {
            e.preventDefault();
            const footworkOptions = document.querySelectorAll('[data-type="footwork"]');
            const heightOptions = document.querySelectorAll('[data-type="height"]');
            
            const randomFootwork = footworkOptions[Math.floor(Math.random() * footworkOptions.length)];
            const randomHeight = heightOptions[Math.floor(Math.random() * heightOptions.length)];
            
            footworkOptions.forEach(b => b.classList.remove('selected'));
            heightOptions.forEach(b => b.classList.remove('selected'));
            
            randomFootwork.classList.add('selected');
            randomHeight.classList.add('selected');
            
            selectedFootwork = randomFootwork.dataset.value;
            selectedHeight = randomHeight.dataset.value;
            
            updateBodyResult();
        });

        document.getElementById('resetBody').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            selectedFootwork = null;
            selectedHeight = null;
            bodyResult.classList.add('hidden');
        });

        function updateBodyResult() {
            if (selectedFootwork && selectedHeight) {
                footworkResult.textContent = selectedFootwork;
                heightResult.textContent = selectedHeight;
                bodyResult.classList.remove('hidden');
            }
        }

        // BPM 生成器逻辑
        let tapTimes = [];
        let bpm = null;
        let tapTimeout = null;

        tapArea.addEventListener('click', function(e) {
            e.preventDefault();
            const now = Date.now();
            
            if (tapTimeout) {
                clearTimeout(tapTimeout);
            }
            
            tapTimes.push(now);
            
            if (tapTimes.length > 8) {
                tapTimes.shift();
            }
            
            if (tapTimes.length >= 2) {
                const intervals = [];
                for (let i = 1; i < tapTimes.length; i++) {
                    intervals.push(tapTimes[i] - tapTimes[i-1]);
                }
                
                const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                const calculatedBPM = Math.round(60000 / avgInterval);
                
                if (calculatedBPM >= 40 && calculatedBPM <= 240) {
                    bpm = calculatedBPM;
                    bpmValue.textContent = bpm;
                }
            }
            
            tapTimeout = setTimeout(() => {
                tapTimes = [];
            }, 3000);
        }, { passive: false });

        document.getElementById('resetBPM').addEventListener('click', function(e) {
            e.preventDefault();
            tapTimes = [];
            bpm = null;
            bpmValue.textContent = '--';
            if (tapTimeout) {
                clearTimeout(tapTimeout);
            }
        });

        // 节拍器逻辑
        let metronomeInterval = null;
        let currentBeat = 0;
        let isMetronomePlaying = false;

        function initBeatsGrid() {
            beatsGrid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            
            for (let i = 1; i <= 8; i++) {
                const beatBox = document.createElement('div');
                beatBox.className = 'beat-box';
                beatBox.innerHTML = `
                    ${i}
                    <span>${i <= 4 ? '第一小节' : '第二小节'}</span>
                `;
                beatBox.dataset.beat = i;
                fragment.appendChild(beatBox);
            }
            
            beatsGrid.appendChild(fragment);
        }

        const startBtn = document.getElementById('startMetronome');
        startBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            if (!bpm) {
                alert('请先连续点击测算 BPM！');
                return;
            }
            
            if (isMetronomePlaying) {
                // Pause logic
                if (metronomeInterval) {
                    cancelAnimationFrame(metronomeInterval);
                    metronomeInterval = null;
                }
                isMetronomePlaying = false;
                startBtn.innerHTML = '启动节拍器';
                return;
            }
            
            isMetronomePlaying = true;
            startBtn.innerHTML = '暂停节拍器';
            
            if (metronomeInterval) {
                cancelAnimationFrame(metronomeInterval);
            }
            
            const interval = 60000 / bpm;
            currentBeat = 0;
            
            let lastTime = performance.now();
            
            function tick() {
                const now = performance.now();
                const elapsed = now - lastTime;
                
                if (elapsed >= interval) {
                    lastTime = now;
                    
                    const beatBoxes = beatsGrid.querySelectorAll('.beat-box');
                    beatBoxes.forEach(box => box.classList.remove('active'));
                    
                    const activeBeat = (currentBeat % 8) + 1;
                    const activeBox = beatsGrid.querySelector(`[data-beat="${activeBeat}"]`);
                    if (activeBox) {
                        activeBox.classList.add('active');
                    }
                    
                    currentBeat++;
                }
                
                if (isMetronomePlaying) {
                    metronomeInterval = requestAnimationFrame(tick);
                }
            }
            
            metronomeInterval = requestAnimationFrame(tick);
        });

        document.getElementById('stopMetronome').addEventListener('click', function(e) {
            e.preventDefault();
            
            if (metronomeInterval) {
                cancelAnimationFrame(metronomeInterval);
                metronomeInterval = null;
            }
            
            isMetronomePlaying = false;
            startBtn.innerHTML = '启动节拍器';
            
            beatsGrid.querySelectorAll('.beat-box').forEach(box => {
                box.classList.remove('active');
            });
        });

        document.getElementById('randomFreeze').addEventListener('click', function(e) {
            e.preventDefault();
            const randomBeat = Math.floor(Math.random() * 8) + 1;
            
            beatsGrid.querySelectorAll('.beat-box').forEach(box => {
                box.classList.remove('freeze');
                const indicator = box.querySelector('.freeze-indicator');
                if (indicator) {
                    indicator.remove();
                }
            });
            
            const freezeBox = beatsGrid.querySelector(`[data-beat="${randomBeat}"]`);
            if (freezeBox) {
                freezeBox.classList.add('freeze');
                freezeBox.innerHTML += '<div class="freeze-indicator">Freeze</div>';
            }
            
            freezeBeat.textContent = `第 ${randomBeat} 拍`;
            freezeResult.classList.remove('hidden');
        });

        window.addEventListener('beforeunload', function() {
            if (metronomeInterval) {
                cancelAnimationFrame(metronomeInterval);
            }
            if (tapTimeout) {
                clearTimeout(tapTimeout);
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isMetronomePlaying) {
                document.getElementById('stopMetronome').click();
            }
        });

        initBeatsGrid();
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });
    </script>
</body>
</html>
